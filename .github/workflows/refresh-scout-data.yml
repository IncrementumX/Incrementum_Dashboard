name: Refresh Scout Data

on:
  schedule:
    # Run every weekday at 23:00 UTC (after US market close)
    - cron: "0 23 * * 1-5"
  workflow_dispatch:  # allow manual trigger

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install fredapi yfinance pandas python-dotenv

      - name: Generate scout-data.json
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python tools/generate_scout_data.py

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scout-data.json
          if git diff --cached --quiet; then
            echo "No changes to scout-data.json"
          else
            git commit -m "chore: refresh scout-data.json [skip ci]"
            git push
          fi
